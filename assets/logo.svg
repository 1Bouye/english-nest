<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" width="200" height="64">
  <!-- Circle badge -->
  <circle cx="32" cy="32" r="30" fill="#2D2A4A"/>
  <!-- "English" inside circle -->
  <text x="32" y="26" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">English</text>
  <!-- "Nest" inside circle -->
  <text x="32" y="41" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#E85D26" text-anchor="middle">Nest</text>
  <!-- Nest arc -->
  <path d="M20 48 Q32 56 44 48" fill="none" stroke="#E85D26" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Three egg dots -->
  <circle cx="28" cy="51.5" r="2.2" fill="#E85D26"/>
  <circle cx="32" cy="53" r="2.2" fill="#E85D26"/>
  <circle cx="36" cy="51.5" r="2.2" fill="#E85D26"/>
  <!-- Wordmark text -->
  <text x="74" y="26" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2D2A4A">English</text>
  <text x="74" y="48" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#E85D26">Nest</text>
</svg>
